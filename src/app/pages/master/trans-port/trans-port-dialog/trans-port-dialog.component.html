<h2 mat-dialog-title class="m-b-24  b-b-1 p-b-20">{{'actions.' + action | translate}} TransPort </h2>
<mat-dialog-content class="mat-typography" style="max-width: 600px" *ngIf="action !== 'Delete'; else elseTemplate">
  <form [formGroup]="transPortForm">
    <div class="row">

        <div class="col-12 col-md-6">
        <mat-form-field appearance="outline" class="w-100 m-t-10">
          <input type="text" matInput formControlName="transPortCompany" placeholder="TransPort Company Name"  />
        </mat-form-field>
      </div>
        
      <div class="col-12 col-md-6">
        <mat-form-field appearance="outline" class="w-100 m-t-10">
          <input type="text" matInput required formControlName="header" placeholder="First Name" />
          <mat-hint *ngIf="transPortForm.get('header')?.hasError('required') && transPortForm.get('header')?.touched"
            class="error-message error-color">
           First Name is required
          </mat-hint>
          <mat-hint *ngIf="transPortForm.get('header')?.hasError('pattern') && transPortForm.get('header')?.touched"
            class="error-message error-color">
          Please enter valid first name 
          </mat-hint>
        </mat-form-field>
      </div>

      <div class="col-12 col-md-6">
        <mat-form-field appearance="outline" class="w-100 m-t-10">
          <input type="text" matInput required formControlName="subHeader" placeholder="Last Name" />
           <mat-hint *ngIf="transPortForm.get('subHeader')?.hasError('required') && transPortForm.get('subHeader')?.touched"
            class="error-message error-color">
            Last Name is required
          </mat-hint>
           <mat-hint *ngIf="transPortForm.get('subHeader')?.hasError('pattern') && transPortForm.get('subHeader')?.touched"
            class="error-message error-color">
           Please enter valid  last name
          </mat-hint>
        </mat-form-field>
      </div>

      <div class="col-12 col-md-6">
        <mat-form-field appearance="outline" class="w-100 m-t-10">
          <input type="text" matInput required formControlName="address" placeholder="Enter Address" />
          <mat-hint *ngIf="transPortForm.get('address')?.hasError('required') && transPortForm.get('address')?.touched"
            class="error-message error-color">
            Address is required
          </mat-hint>
        </mat-form-field>
      </div>

      <div class="col-12 col-md-6">
        <mat-form-field appearance="outline" class="w-100 m-t-10">
          <input type="number" matInput  required
            formControlName="mobileNo" placeholder="Mobile no"   min="0"/>
          <mat-hint *ngIf="transPortForm.get('mobileNo')?.hasError('required') && transPortForm.get('mobileNo')?.touched"
            class="error-message error-color">
            Mobileno is required
          </mat-hint>
          <mat-hint *ngIf="transPortForm.get('mobileNo')?.hasError('pattern') && transPortForm.get('mobileNo')?.touched"
            class="error-message error-color">
            Invalid mobileno is required
          </mat-hint>
        </mat-form-field>
      </div>

      <div class="col-12 col-md-6">
        <mat-form-field appearance="outline" class="w-100 m-t-10">
          <input type="text" matInput formControlName="transPortId" placeholder="Trans Port Id"  />
        </mat-form-field>
      </div>

    </div>
    <mat-divider></mat-divider>
    <mat-dialog-actions class="p-24 justify-content-end" >
      <button mat-stroked-button color="warn" mat-dialog-close>Cancel</button>
      <button mat-flat-button [mat-dialog-close]="true" [disabled]="!transPortForm.valid" color="primary" (click)="doAction();">
        {{'actions.' + action | translate}}
      </button>
    </mat-dialog-actions>
  </form>
</mat-dialog-content>
<ng-template #elseTemplate>
  <div class="p-x-24">
    <p>Sure to delete<span class="f-w-600">{{local_data.Name}}</span> ?</p>
  </div>
  <mat-divider></mat-divider>
  <div mat-dialog-actions class="p-x-24 p-b-24 m-t-10 justify-content-end">
    <button mat-button (click)="doAction()" mat-flat-button color="warn">
      {{'actions.' + action | translate}}
    </button>
    <button mat-stroked-button color="warn" (click)="closeDialog()" class="m-l-8">Cancel</button>
  </div>
</ng-template>
