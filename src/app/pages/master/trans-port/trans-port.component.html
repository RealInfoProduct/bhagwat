<mat-card class="cardWithShadow">
  <mat-card-content class="p-24">
    <div class="row justify-content-between">
      <div class="col-lg-4">
        <mat-form-field appearance="outline" class="w-100 hide-hint">
          <input matInput placeholder="Search TransPort" (keyup)="applyFilter($any($event.target).value)"/>
          <mat-icon matSuffix>
            <i-tabler name="search" class="icon-20"></i-tabler>
          </mat-icon>
        </mat-form-field>
      </div>
      <div class="col-lg-4 d-flex align-items-center justify-content-end">
        <button mat-flat-button color="primary" (click)="addTransPort('Add', {})">
         ADD TransPort
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>

<mat-card class="cardWithShadow">
  <mat-card-content class="p-24">
    <div class="table-responsive">
      <table style="min-width: 120%;" mat-table [dataSource]="transPortDataSource" class="w-100">

        <ng-container matColumnDef="#">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">Sr No.</th>
          <td mat-cell *matCellDef="let element; let i = index">{{ i + 1 }}</td>
        </ng-container>
        
        <ng-container matColumnDef="transPortCompany">
        <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">
         Company Name
        </th>
        <td mat-cell *matCellDef="let element">
            {{ element.transPortCompany }}
        </td>
        </ng-container>

        <ng-container matColumnDef="header">
        <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">
            First Name
        </th>
        <td mat-cell *matCellDef="let element">
            {{ element.header }}
        </td>
        </ng-container>

        <ng-container matColumnDef="Subheader">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">
         Last Name
          </th>
          <td mat-cell *matCellDef="let element" class="f-s-14">
            {{ element.subHeader }}
          </td>
        </ng-container>

        <ng-container matColumnDef="MobileNo">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">
           Mobile No
          </th>
          <td mat-cell *matCellDef="let element" class="f-s-14">
            {{ element.mobileNo}}
          </td>
        </ng-container>

        <ng-container matColumnDef="Address">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">
           Address
          </th>
          <td mat-cell *matCellDef="let element" class="f-s-14 address-cell">
            {{ element.address }}
          </td>
        </ng-container>

        <ng-container matColumnDef="transPortId">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">
           TransPort Id
          </th>
          <td mat-cell *matCellDef="let element" class="f-s-14">
            {{ element.transPortId }}
          </td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef class="f-s-16 f-w-600">
           Action
          </th>
          <td mat-cell *matCellDef="let element" class="action-link">
            <a class="m-r-10 cursor-pointer"><i-tabler name="edit" (click)="addTransPort('Edit', element)"
                class="icon-18"></i-tabler></a>
            <a class="m-r-10 cursor-pointer">
              <i-tabler name="trash" (click)="addTransPort('Delete', element)" class="icon-18"></i-tabler>
            </a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        <tr class="mat-row" style="text-align: center;" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayedColumns.length">
            No record found
          </td>
        </tr>
      </table>
      <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
